<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Molten.IO</title>
    <link rel="icon" type="image/x-icon" href="../favicon.png" />
    <link rel="stylesheet" href="../styles/general.css" />
    <link rel="stylesheet" href="../styles/header.css" />
    <link rel="stylesheet" href="../styles/dashboard_page.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Poiret+One&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="header"></div>

    <main>
      <img class="main_bg" src="../elements/join_bg.gif" />
      <h1 class="greeting_hidden"></h1>
      <section class="user_surveySection">
        <h1 class="survey_title"><b>Now...</b> Tell us about yourself!</h1>
        <hr class="divider" />
        <div class="question-box" id="question-box">
          <h2 id="question-text"></h2>

          <div id="progress-circles">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
          </div>

          <div id="options-container"></div>
        </div>

        <div class="end_text">
          <h2 class="end_h2">You just took a very important step...</h2>
          <h2 class="end_sub">
            <b>You set a goal</b>, Now it's time to achieve it!
          </h2>
        </div>
      </section>
    </main>

    <script src="../scripts/header.js"></script>
    <script type="module" src="../scripts/google-login.js"></script>
    <script
      type="module"
      src="../scripts/dashboard scripts/user_survey.js"
    ></script>
  </body>
</html>
